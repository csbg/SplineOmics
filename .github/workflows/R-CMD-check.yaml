on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: '4.5.0'}
          - {os: ubuntu-22.04,  r: '4.5.0'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      R_BITMAP_TYPE: cairo
      BIOC_VERSION: '3.21'

      # Prevent renv from auto-activating during CI unless explicitly restored.
      # This avoids mixing renv lockfile state with BiocManager/setup-r-dependencies.
      RENV_CONFIG_AUTOLOADER_ENABLED: "FALSE"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libz-dev libbz2-dev liblzma-dev libcurl4-openssl-dev \
            libssl-dev libxml2-dev libgit2-dev build-essential \
            libharfbuzz-dev libfribidi-dev libfontconfig1-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            qpdf ghostscript

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: false

      - name: Configure and initialize Bioconductor
        shell: Rscript {0}
        run: |
          cran <- if (.Platform$OS.type == "windows") {
            "https://packagemanager.posit.co/cran/2026-01-01"
          } else {
            "https://packagemanager.posit.co/cran/__linux__/jammy/2026-01-01"
          }

          options(repos = c(CRAN = cran))
          install.packages("BiocManager")

          repos <- BiocManager::repositories(version = Sys.getenv("BIOC_VERSION"))
          repos["CRAN"] <- cran
          options(repos = repos)

          cat("Repos:\n")
          print(getOption("repos"))

          BiocManager::install(
            version = Sys.getenv("BIOC_VERSION"),
            ask = FALSE,
            update = TRUE
          )

      - name: Install Bioconductor core dependencies explicitly
        shell: Rscript {0}
        run: |
          cran <- if (.Platform$OS.type == "windows") {
            "https://packagemanager.posit.co/cran/2026-01-01"
          } else {
            "https://packagemanager.posit.co/cran/__linux__/jammy/2026-01-01"
          }

          repos <- BiocManager::repositories(version = Sys.getenv("BIOC_VERSION"))
          repos["CRAN"] <- cran
          options(repos = repos)

          BiocManager::install(
            c("BiocParallel", "limma", "variancePartition"),
            version = Sys.getenv("BIOC_VERSION"),
            ask = FALSE,
            update = TRUE
          )

      - name: Show session info
        shell: Rscript {0}
        run: |
          sessionInfo()

          pkgs <- c(
            "BiocManager",
            "BiocParallel",
            "limma",
            "variancePartition",
            "lme4",
            "lmerTest",
            "pbkrtest",
            "Matrix",
            "RcppEigen"
          )

          for (p in pkgs) {
            cat(p, ": ")
            if (requireNamespace(p, quietly = TRUE)) {
              cat(as.character(packageVersion(p)), "\n")
            } else {
              cat("not installed\n")
            }
          }

          BiocManager::valid()

      - uses: r-lib/actions/setup-r-dependencies@v2
	with:
	  extra-packages: any::rcmdcheck
	  needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
